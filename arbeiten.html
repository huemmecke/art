<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Martin Hümmecke — Arbeiten (Preview)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">Martin Hümmecke</a>
    <nav class="nav" aria-label="Hauptnavigation">
      <a href="index.html">Startseite</a>
      <a href="#rote-serie">Rote Serie</a>
      <a href="#kraftkarton">Kraftkarton</a>
    </nav>
  </header>

  <section class="page-intro">
    <p class="eyebrow"><span>Katalog</span><span class="rail-tick"></span></p>
    <h1>Zeichnungen</h1>
  </section>

  <section id="rote-serie" class="section reveal" style="padding-top:6vh">
    <div class="gallery-head">
      <h2>Rote Serie</h2>
      <span class="gallery-count" id="rote-count"></span>
    </div>
    <div class="masonry" id="rote-grid"></div>
  </section>

  <section id="kraftkarton" class="section reveal" style="padding:10vh 5vw">
    <div class="gallery-head">
      <h2>Kraftkarton</h2>
      <span class="gallery-count" id="kk-count"></span>
    </div>
    <div class="carousel-wrap">
      <div class="kk-track" id="kk-track"></div>
      <button class="carousel-btn prev" id="kk-prev" aria-label="Zurück">‹</button>
      <button class="carousel-btn next" id="kk-next" aria-label="Weiter">›</button>
    </div>
  </section>

  <footer class="site-footer">
    <div class="footer-links">
      <a href="https://www.instagram.com/martin.huemmecke/?hl=de" target="_blank" rel="noopener">Instagram</a>
      <a href="https://www.tiktok.com/@martin.huemmecke" target="_blank" rel="noopener">TikTok</a>
      <a href="mailto:mhuemmecke@gmx.de?subject=Art">E-Mail</a>
      <a href="index.html#impressum">Impressum</a>
      <a href="index.html#datenschutz">Datenschutz</a>
    </div>
    <span class="copy">© 2026 Martin Hümmecke</span>
  </footer>

  <div class="lightbox" id="lightbox" hidden role="dialog" aria-modal="true" aria-label="Bildansicht, Escape zum Schließen">
    <img id="lightbox-img" alt="">
    <button class="lightbox-close" id="lightbox-close" aria-label="Schließen">×</button>
  </div>

  <script>
    const FRAMED_BASE = 'uploads/huemmecke-art/inbox/framed/';

    const ROTE_SERIE = [
      { src: FRAMED_BASE + 'MH_print_red-warrior01_framed.png', alt: 'Rote Serie – Red Warrior 01 (gerahmt)' },
      { src: FRAMED_BASE + 'MH_print_red-warrior03_framed.png', alt: 'Rote Serie – Red Warrior 03 (gerahmt)' },
      { src: FRAMED_BASE + 'MH_print_fall01_framed.png', alt: 'Rote Serie – Fall 01 (gerahmt)' },
    ];

    const KRAFTKARTON = [
      { file: 'MH_artcards-scan_2024_Vol01_harbour01_framed.png', title: 'Harbour 01' },
      { file: 'MH_artcards-scan_2024_Vol01_harbour02_framed.png', title: 'Harbour 02' },
      { file: 'MH_artcards-scan_2024_Vol01_shipyard01_framed.png', title: 'Shipyard 01' },
      { file: 'MH_artcards-scan_2024_Vol02_mindofwool_framed.png', title: 'Mind of Wool' },
      { file: 'MH_artcards-scan_2024_Vol02_woolhead01_framed.png', title: 'Woolhead 01' },
      { file: 'MH_artcards-scan_2024_Vol02_woolpack02_framed.png', title: 'Woolpack 02' },
      { file: 'MH_artcards-scan_2024_Vol02_woolwalk01_framed.png', title: 'Woolwalk 01' },
      { file: 'MH_artcards-scan_2024_Vol03_arrowmind_framed.png', title: 'Arrowmind' },
      { file: 'MH_artcards-scan_2024_Vol03_butterflies_framed.png', title: 'Butterflies' },
      { file: 'MH_artcards-scan_2024_Vol03_confusion_framed.png', title: 'Confusion' },
      { file: 'MH_artcards-scan_2024_Vol03_elegance_framed.png', title: 'Elegance' },
      { file: 'MH_artcards-scan_2024_Vol03_pipemiracle_framed.png', title: 'Pipemiracle' },
      { file: 'MH_artcards-scan_2024_Vol03_silentfish_framed.png', title: 'Silentfish' },
      { file: 'MH_artcards-scan_2024_Vol03_spiralmind_framed.png', title: 'Spiralmind' },
      { file: 'MH_artcards-scan_2024_Vol07_smoking-wool_framed.png', title: 'Smoking Wool' },
    ];

    const kraftkarton = KRAFTKARTON.map((entry) => ({
      src: FRAMED_BASE + entry.file,
      alt: 'Kraftkarton – ' + entry.title + ' (gerahmt)',
      framed: true,
    }));

    const allImages = [...ROTE_SERIE, ...kraftkarton];

    document.getElementById('rote-count').textContent = ROTE_SERIE.length + ' Arbeiten';
    document.getElementById('kk-count').textContent = kraftkarton.length + ' Arbeiten';

    const roteGrid = document.getElementById('rote-grid');
    ROTE_SERIE.forEach((pic, i) => {
      const fig = document.createElement('figure');
      fig.className = 'is-framed';
      fig.tabIndex = 0;
      fig.role = 'button';
      fig.setAttribute('aria-label', pic.alt + ' vergrößern');
      fig.dataset.idx = String(i);
      const img = document.createElement('img');
      img.src = pic.src;
      img.alt = pic.alt;
      fig.appendChild(img);
      roteGrid.appendChild(fig);
    });

    const track = document.getElementById('kk-track');
    kraftkarton.forEach((pic, i) => {
      const fig = document.createElement('figure');
      fig.className = 'kk-slide' + (pic.framed ? ' is-framed' : '');
      fig.tabIndex = 0;
      fig.role = 'button';
      fig.setAttribute('aria-label', pic.alt + ' vergrößern');
      fig.dataset.idx = String(i + ROTE_SERIE.length);
      const img = document.createElement('img');
      img.src = pic.src;
      img.alt = pic.alt;
      fig.appendChild(img);
      track.appendChild(fig);
    });

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    function openLightbox(idx) {
      lightboxImg.src = allImages[idx].src;
      lightboxImg.alt = allImages[idx].alt;
      lightbox.hidden = false;
    }
    function closeLightbox() {
      lightbox.hidden = true;
      lightboxImg.src = '';
    }
    document.querySelectorAll('[data-idx]').forEach((el) => {
      el.addEventListener('click', () => openLightbox(Number(el.dataset.idx)));
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          openLightbox(Number(el.dataset.idx));
        }
      });
    });
    lightbox.addEventListener('click', closeLightbox);
    document.getElementById('lightbox-close').addEventListener('click', (e) => {
      e.stopPropagation();
      closeLightbox();
    });
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !lightbox.hidden) closeLightbox();
    });

    document.getElementById('kk-prev').addEventListener('click', () => {
      track.scrollBy({ left: -track.clientWidth, behavior: 'smooth' });
    });
    document.getElementById('kk-next').addEventListener('click', () => {
      track.scrollBy({ left: track.clientWidth, behavior: 'smooth' });
    });

    const REVEAL_IDS = ['rote-serie', 'kraftkarton'];
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0, rootMargin: '0px 0px -8% 0px' });
    REVEAL_IDS.forEach((id) => {
      const el = document.getElementById(id);
      if (!el) return;
      if (el.getBoundingClientRect().top < window.innerHeight) el.classList.add('is-visible');
      else observer.observe(el);
    });
    setTimeout(() => REVEAL_IDS.forEach((id) => document.getElementById(id)?.classList.add('is-visible')), 3000);
  </script>
</body>
</html>
